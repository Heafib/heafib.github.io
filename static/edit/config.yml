site_url: https://heafib.com
base_url: /edit
backend:
  name: github
  repo: Heafib/heafib.github.io   # 你的 GitHub 用户名/仓库名，注意大小写
  branch: master                     # 你的仓库主分支名（可能是 main 或 master）
  base_url: https://sveltia-cms-auth.heafib.workers.dev # 你的认证 Worker 域名（不要加 /callback）

# 媒体文件存放位置（建议保持与 Hugo 一致）
media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "post"                   # 集合名称，对应你的文章目录
    label: "博客文章"
    folder: "content/post"          # Stack 主题默认文章存放路径
    create: true                    # 允许新建文章
    slug: "{{slug}}"                # 文件名格式（使用标题的 slug）
    fields:                         # 文章包含的字段
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime" }
      - { label: "描述", name: "description", widget: "text", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "正文", name: "body", widget: "markdown" }